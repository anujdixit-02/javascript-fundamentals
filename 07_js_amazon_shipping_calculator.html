<!DOCTYPE html>
<html>
  
  <head>
 <title>
    AMAZON SHIPPING CALCULATOR
  </title>

  <style>
    body{
      font-family: Arial, Helvetica, sans-serif;
    }

    .total{
      font-size: 15px;
      padding: 10px;

    }
    .calculateButton{
      border: none;
      cursor: pointer;
      background-color: green;
      color: white;
      padding: 12px;
    }
    .js-input{
      border: none;
      cursor: pointer;
      background-color: green;
      color: white;
      padding: 12px;
    }
  </style>
  </head>
  <body>
    <p>
      AMAZON SHIPPING CALCULATOR
    </p>
    <input type="text" placeholder="itemCost " class="total" onkeydown="
          console.log(event.key);
      if(event.key === 'Enter'){
        calculateTotal();
      }

    ">
    <button onclick=" 
    calculateTotal();
    " class="calculateButton">Calculate</button>
    <p class="cost"></p>
    <button onclick="
     resetCalculator();
    " class="js-input">Reset</button> 


    <script>

       

 
      function calculateTotal(){ 

       const inputElement = document.querySelector('.total');
      let cost = Number( inputElement.value ); 

      if(cost < 40){
        cost += 10;
      }
      document.querySelector('.cost').innerHTML = `$ ${cost}`; 
      
    }
    function resetCalculator() {
      // Clear input
      document.querySelector('.js-input').value = '';

      // Clear result
      document.querySelector('.cost').innerHTML = '';
    }

    </script>
  </body>
</html>
