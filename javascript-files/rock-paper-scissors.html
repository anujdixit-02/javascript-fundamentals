  <button onclick="
   /*To choose the random numbers js have the math.random() tool*/
   const randomNumber = Math.random();

   let computerMove = '';

   if(randomNumber>=0 && randomNumber< 1/3){
     computerMove = 'Rock';
   }  else if(randomNumber>=1/3 && randomNumber< 2/3){
     computerMove = 'Paper' ;

     computerMove = 'Scissors'; 
   }

    

   let result ='';
  /*compare the result and add them in the (result variable) by ===*/
   if(computerMove === 'Rock'){
    result = 'Tie.';
   } else if (computerMove === 'Paper'){
    result = 'You Lose. ';
   } else if (computerMove === 'Scissors'){
    result = 'You wins!!';
   }


  /*print result by ${}*/
   alert(`You Picked Rock . Computer Picked
   n${computerMove}.
    \n ${result}   `);
  ">Rock</button>
